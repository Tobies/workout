<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#0c1c38"/>
      <stop offset="100%" stop-color="#050913"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g fill="none" stroke="#5ad6ff" stroke-width="10" filter="url(#glow)">
    <!-- corner brackets -->
    <path d="M120 96 H96 V120"/>
    <path d="M392 96 H416 V120"/>
    <path d="M120 416 H96 V392"/>
    <path d="M392 416 H416 V392"/>
  </g>
  <!-- sword -->
  <g filter="url(#glow)">
    <path d="M256 116 L286 300 L256 332 L226 300 Z" fill="#3da9fc" stroke="#5ad6ff" stroke-width="6"/>
    <rect x="196" y="332" width="120" height="20" rx="6" fill="#5ad6ff"/>
    <rect x="246" y="352" width="20" height="44" rx="6" fill="#5ad6ff"/>
  </g>
</svg>
